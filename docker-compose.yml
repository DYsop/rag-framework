version: '3.9'

# ══════════════════════════════════════════════════
# RAG-Framework · Lokale Infrastruktur
# Start: docker-compose up -d
# Stop:  docker-compose down
# ══════════════════════════════════════════════════

services:

  # ── Qdrant Vektordatenbank ───────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Neo4j Wissensgraph ───────────────────────────
  neo4j:
    image: neo4j:5.20
    container_name: rag-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────
  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      - qdrant
      - neo4j
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
